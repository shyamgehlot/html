<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexnav</title>
    <style>
        nav{
            height: 60px;
            width: 100%;
            background-color:orange;
            
            
            
        }
        #p{
        height: 60px;
            display: flex;
            
            justify-content: center;
            /* justify-content: space-evenly; */
            justify-content: space-around;
            /* gap: 50px; */
            font-size: 20px;

            list-style: none;
            align-items: center;
        }
        li a{
            text-decoration: none;
            color: black;
            
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul id="p">
                <li><a href="">home</a></li>
                <li><a href="">about</a></li>
                <li><a href="">skils</a></li>
                <li><a href="">contect</a></li>
                <div>
                <input type="search">
                <button>search</button>
                </div>

            </ul>
        </nav>
    </header>
    
</body>
</html>
