<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex</title>
    <style>
        #p{
            height: 700px;
            width: 700px;
            background-color: cadetblue;
            display: flex;
            flex-direction: row-reverse;
            /* gap: 60px; */
            /* justify-content: baseline; */
            /* justify-content: center; */
            /* justify-content: end; */
            justify-content: flex-start;
            justify-content: space-evenly;
            flex-wrap: wrap;

        }
        .c{
            height: 100px;
            width: 100px;
            background-color: burlywood;
            border: 3px,solid;
            
        }
    </style>
</head>
<body>
    <div id="p">
        <div class="c"></div>
        <div class="c"></div>
        <div class="c"></div>
        <div class="c"></div>
        <div class="c"></div>
    </div>
    
</body>
</html>
