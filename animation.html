<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .contener{
            height: 50px;
            width: 200px;
            background-color:blue ;  
            border-radius: 20px;    
            border: 5px dotted black;
            animation-name: s;
            animation-duration: 5s;
            animation-timing-function: ease-out;
            animation-delay: 0s;
            animation-iteration-count: infinite;
            animation-direction: alternate;

          }
          @keyframes s{
            from{ background-color: red;}
            to{  background-color: green; background-color: yellow; margin-left: 700px; margin-top: 670px; margin-right: 700px; margin-bottom: 700px}
          }


    </style>
</head>
<body>
    <div class="contener">

    </div>
</body>
</html>
